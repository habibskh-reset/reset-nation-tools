<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPrompter Ultra</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- DOMPurify for XSS Protection -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800;900&family=JetBrains+Mono:wght@500&display=swap');
        
        :root {
            --brand-emerald: #10b981;
            --brand-indigo: #6366f1;
            --bg-ultra-dark: #050505;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-ultra-dark); 
            margin: 0; 
            overflow: hidden; 
            color: #fafafa;
        }
        
        [contentEditable]:empty:before { content: attr(placeholder); color: #3f3f46; cursor: text; }
        
        /* Glassmorphism Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        
        /* Modern Range Sliders */
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.05); height: 4px; border-radius: 10px; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: var(--brand-emerald); border: 2px solid #fff; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        /* Mirror Transformation Layers */
        .mirror-h { transform: scaleX(-1); }
        .mirror-v { transform: scaleY(-1); }
        .mirror-both { transform: scale(-1, -1); }
        
        /* High-End Text Rendering */
        .word-node { 
            display: inline-block;
            transition: color 0.2s ease; 
        }

        /* Peripheral Fade Effect */
        .fade-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 5;
            background: linear-gradient(to bottom, 
                var(--bg-ultra-dark) 0%, 
                transparent 35%, 
                transparent 65%, 
                var(--bg-ultra-dark) 100%);
        }

        /* Animated Pulse */
        @keyframes pulse-soft {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .voice-active-indicator { animation: pulse-soft 2s infinite ease-in-out; }
        
        .glass-panel {
            background: rgba(15, 15, 18, 0.95);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .control-label {
            font-size: 8px;
            font-weight: 800;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 4px;
        }

        .step-btn {
            @apply w-7 h-7 flex items-center justify-center bg-white/5 hover:bg-white/10 active:bg-white/20 rounded border border-white/5 transition-all text-sm font-bold;
        }

        @keyframes bounce-x-left {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }
        @keyframes bounce-x-right {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-8px); }
        }
        .animate-bounce-left { animation: bounce-x-left 2s infinite ease-in-out; }
        .animate-bounce-right { animation: bounce-x-right 2s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- Custom SVG Icons for Reliability ---
        const IconPlay = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        );
        const IconPause = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        );
        const IconReset = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const IconMic = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        );
        const IconCursor = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 3l3.293 3.293-7 7 1.414 1.414 7-7L21 11V3h-8z"/><path d="M19 19H5V5h7l-2-2H5c-1.105 0-2 .895-2 2v14c0 1.105.895 2 2 2h14c1.105 0 2-.895 2-2v-5l-2-2v7z"/></svg>
        );
        const IconEdit = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        );
        const IconPrompter = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="15" x="2" y="3" rx="2"/><line x1="2" y1="18" x2="22" y2="18"/></svg>
        );
        const IconAlignLeft = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
        );
        const IconAlignCenter = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="18" y1="18" x2="6" y2="18"/></svg>
        );
        const IconAlignRight = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
        );
        const IconPointerArrow = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z" /></svg>
        );

        const STORAGE_KEY = 'smartprompter_script_v1';

        const App = () => {
            const [script, setScript] = useState(() => localStorage.getItem(STORAGE_KEY) || '');
            const [isEditing, setIsEditing] = useState(true);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isVoiceSync, setIsVoiceSync] = useState(false);
            const [scrollSpeed, setScrollSpeed] = useState(5);
            const [fontSize, setFontSize] = useState(56);
            const [margin, setMargin] = useState(12); 
            const [mirrorMode, setMirrorMode] = useState('none'); 
            const [alignment, setAlignment] = useState('center'); 
            const [progress, setProgress] = useState(0);
            const [isAiProcessing, setIsAiProcessing] = useState(false);
            
            const prompterRef = useRef(null);
            const scriptWordsRef = useRef([]);
            const rafIdRef = useRef(null);
            const wordNodesCache = useRef(new Map());
            const recognitionRef = useRef(null);
            
            const lastMatchedIndexRef = useRef(0);
            const isSpeechRestartingRef = useRef(false);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, script);
                wordNodesCache.current.clear();
                lastMatchedIndexRef.current = 0;
            }, [script]);

            // --- SECURE & CANVAS-AWARE AI Optimization Engine ---
            const optimizeScript = async () => {
                if (!script.trim()) return;
                setIsAiProcessing(true);

                // Construct full instructions
                const promptText = `Convert this text into a professional teleprompter script: 
                1. Emphasize key impact words with <strong> tags. 
                2. Use <br><br> for breathing pauses. 
                3. Clean formatting. HTML only. Script: ${script}`;

                try {
                    const isDeployed = window.location.hostname.includes('netlify.app') || 
                                       (window.location.hostname !== 'localhost' && !window.location.hostname.includes('googleusercontent.com'));

                    let data;
                    if (isDeployed) {
                        // PRODUCTION: Use your Netlify Proxy Function
                        const response = await fetch('/.netlify/functions/get-ai-response', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            // Send the raw script; the function handles the instructions
                            body: JSON.stringify({ prompt: script }) 
                        });
                        if (!response.ok) throw new Error("Netlify Function error. Check your deployment logs.");
                        data = await response.json();
                    } else {
                        // CANVAS PREVIEW: Use direct API (Canvas provides the key)
                        const apiKey = ""; 
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                        });
                        if (!response.ok) throw new Error("Canvas Preview API error");
                        data = await response.json();
                    }

                    // Extract content reliably
                    let cleaned = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    
                    // SAFEGUARD: Only update if the AI actually returned content
                    if (cleaned.trim().length > 0) {
                        cleaned = cleaned.replace(/```html|```/g, '').trim();
                        setScript(DOMPurify.sanitize(cleaned));
                    } else {
                        throw new Error("AI returned an empty response.");
                    }
                } catch (e) { 
                    console.error("Optimize Error:", e);
                    alert("AI Error: " + e.message);
                } finally { 
                    setIsAiProcessing(false); 
                }
            };

            const updateProgress = useCallback(() => {
                if (!prompterRef.current) return;
                const container = prompterRef.current;
                const scrollableHeight = container.scrollHeight - container.clientHeight;
                setProgress(scrollableHeight > 0 ? (container.scrollTop / scrollableHeight) * 100 : 0);
            }, []);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return;
                
                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                
                recognition.onresult = (e) => {
                    if (!isPlaying || !isVoiceSync) return;
                    let transcript = "";
                    for (let i = e.resultIndex; i < e.results.length; i++) {
                        transcript += e.results[i][0].transcript.toLowerCase();
                    }
                    handleVoiceTracking(transcript);
                };

                recognition.onend = () => {
                    if (isVoiceSync && isPlaying && !isSpeechRestartingRef.current) {
                        isSpeechRestartingRef.current = true;
                        setTimeout(() => {
                            try {
                                if (isVoiceSync && isPlaying) recognition.start();
                            } catch (err) {}
                            isSpeechRestartingRef.current = false;
                        }, 300);
                    }
                };
                
                recognitionRef.current = recognition;

                if (isVoiceSync && isPlaying) {
                    try {
                        recognition.start();
                    } catch (err) {}
                }

                return () => {
                    if (recognitionRef.current) {
                        recognitionRef.current.onend = null;
                        recognitionRef.current.stop();
                    }
                };
            }, [isVoiceSync, isPlaying]);

            const scrollLoop = useCallback(() => {
                if (isPlaying && !isVoiceSync && !isEditing && prompterRef.current) {
                    prompterRef.current.scrollTop += (scrollSpeed * 0.12);
                    updateProgress();
                    rafIdRef.current = requestAnimationFrame(scrollLoop);
                }
            }, [isPlaying, isVoiceSync, isEditing, scrollSpeed, updateProgress]);

            useEffect(() => {
                if (isPlaying && !isVoiceSync && !isEditing) {
                    rafIdRef.current = requestAnimationFrame(scrollLoop);
                } else {
                    cancelAnimationFrame(rafIdRef.current);
                }
                return () => cancelAnimationFrame(rafIdRef.current);
            }, [isPlaying, isVoiceSync, isEditing, scrollLoop]);

            useEffect(() => {
                const handleKey = (e) => {
                    if (isEditing) return;
                    switch (e.code) {
                        case 'Space': e.preventDefault(); setIsPlaying(prev => !prev); break;
                        case 'ArrowUp': e.preventDefault(); if (!isPlaying) setFontSize(f => Math.min(120, f + 4)); break;
                        case 'ArrowDown': e.preventDefault(); if (!isPlaying) setFontSize(f => Math.max(20, f - 4)); break;
                        case 'ArrowLeft': e.preventDefault(); if (prompterRef.current) prompterRef.current.scrollTop -= 80; break;
                        case 'ArrowRight': e.preventDefault(); if (prompterRef.current) prompterRef.current.scrollTop += 80; break;
                        case 'Escape': e.preventDefault(); setIsEditing(true); break;
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [isEditing, isPlaying]);

            const handleVoiceTracking = (transcript) => {
                const words = transcript.split(/\s+/).filter(w => w);
                const spoken = words.pop();
                if (!spoken) return;
                
                const lastIdx = lastMatchedIndexRef.current || 0;
                const searchRange = 50;
                const cleanSpoken = spoken.toLowerCase().replace(/[^\w]/g, '');

                for (let i = lastIdx; i < Math.min(lastIdx + searchRange, scriptWordsRef.current.length); i++) {
                    const sWord = scriptWordsRef.current[i].text.toLowerCase().replace(/[^\w]/g, '');
                    if (sWord === cleanSpoken || (sWord.length > 3 && sWord.startsWith(cleanSpoken))) {
                        lastMatchedIndexRef.current = i;
                        const el = wordNodesCache.current.get(`word-node-${i}`);
                        if (el) {
                            el.scrollIntoView({ behavior: 'auto', block: 'center' });
                        }
                        break;
                    }
                }
                updateProgress();
            };

            const setWordRef = useCallback((id) => (node) => {
                if (node) wordNodesCache.current.set(id, node);
                else wordNodesCache.current.delete(id);
            }, []);

            const RenderScript = useCallback(() => {
                const div = document.createElement('div');
                div.innerHTML = DOMPurify.sanitize(script);
                const list = [];
                let id = 0;
                
                const traverse = (node, isBold = false) => {
                    if (node.nodeType === 3) {
                        return node.textContent.split(/(\s+)/).map((p, i) => {
                            if (/\s+/.test(p)) return p;
                            if (!p) return null;
                            const curId = id++;
                            const domId = `word-node-${curId}`;
                            list.push({ id: curId, text: p });
                            const baseClass = "word-node";
                            const boldClass = isBold ? " text-emerald-400 font-black drop-shadow-[0_0_10px_rgba(16,185,129,0.3)]" : " text-white";
                            return (
                                <span key={curId} ref={setWordRef(domId)} id={domId} className={baseClass + boldClass}>
                                    {p}
                                </span>
                            );
                        });
                    }
                    const tag = node.nodeName.toLowerCase();
                    const currentIsBold = isBold || tag === 'strong' || tag === 'b';
                    const children = Array.from(node.childNodes).map((c, i) => <React.Fragment key={i}>{traverse(c, currentIsBold)}</React.Fragment>);
                    
                    if (tag === 'br') return <br key={Math.random()} />;
                    if (tag === 'p' || tag === 'div') return <div key={Math.random()} className="mb-10">{children}</div>;
                    return children;
                };
                
                const out = traverse(div);
                scriptWordsRef.current = list;
                return out;
            }, [script, setWordRef]);

            const getAlignmentClass = () => {
                if (alignment === 'left') return 'text-left';
                if (alignment === 'right') return 'text-right';
                return 'text-center';
            };

            return (
                <div className="flex flex-col h-screen bg-black overflow-hidden select-none">
                    {/* --- PRO COMMAND CENTER --- */}
                    <div className="glass-panel px-6 py-4 z-[100] flex items-center justify-between shadow-2xl">
                        <div className="flex items-center gap-6">
                            <div className="flex bg-white/5 rounded-xl p-1 border border-white/10 shadow-inner">
                                <button onClick={() => setIsEditing(true)} className={`px-5 py-2 rounded-lg flex items-center gap-2 font-bold text-[10px] tracking-widest transition-all ${isEditing ? 'bg-indigo-600 text-white shadow-lg' : 'text-zinc-500 hover:text-zinc-300'}`}>
                                    <IconEdit /> EDITOR
                                </button>
                                <button onClick={() => {setIsEditing(false); setIsPlaying(false);}} className={`px-5 py-2 rounded-lg flex items-center gap-2 font-bold text-[10px] tracking-widest transition-all ${!isEditing ? 'bg-emerald-600 text-white shadow-lg' : 'text-zinc-500 hover:text-zinc-300'}`}>
                                    <IconPrompter /> PROMPTER
                                </button>
                            </div>

                            {!isEditing && (
                                <div className="flex items-center gap-4 border-l border-white/10 pl-6">
                                    <button onClick={() => setIsPlaying(!isPlaying)} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all shadow-xl active:scale-95 ${isPlaying ? 'bg-red-500/20 text-red-500 border border-red-500/50' : 'bg-emerald-500 text-black'}`}>
                                        {isPlaying ? <IconPause /> : <IconPlay />}
                                    </button>

                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => {const SR = window.SpeechRecognition || window.webkitSpeechRecognition; if (!SR) return alert("Speech not supported"); setIsVoiceSync(!isVoiceSync); if(!isVoiceSync) setIsPlaying(true);}}
                                            className={`px-4 py-2 rounded-xl border text-[10px] font-black transition-all flex items-center gap-2 ${isVoiceSync ? 'bg-emerald-600 border-emerald-400 text-white voice-active-indicator' : 'bg-white/5 border-white/10 text-zinc-500'}`}
                                        >
                                            <IconMic /> VOICE SYNC
                                        </button>
                                        <button 
                                            onClick={() => {setIsVoiceSync(false); if(!isPlaying) setIsPlaying(true);}}
                                            className={`px-4 py-2 rounded-xl border text-[10px] font-black transition-all flex items-center gap-2 ${!isVoiceSync && isPlaying ? 'bg-blue-600 border-blue-400 text-white shadow-lg' : 'bg-white/5 border-white/10 text-zinc-500'}`}
                                        >
                                            <IconCursor /> AUTO SCROLL
                                        </button>
                                    </div>

                                    <button 
                                        onClick={() => {setIsPlaying(false); if(prompterRef.current) prompterRef.current.scrollTop = 0; setProgress(0); lastMatchedIndexRef.current = 0;}} 
                                        className="w-10 h-10 bg-white/5 hover:bg-white/10 text-zinc-400 rounded-xl border border-white/10 transition-all flex items-center justify-center"
                                    >
                                        <IconReset />
                                    </button>
                                </div>
                            )}
                        </div>

                        {!isEditing && (
                            <div className="flex items-center gap-6 bg-black/40 px-6 py-2 rounded-2xl border border-white/5 shadow-inner">
                                <div className={`flex items-center gap-6 ${isPlaying ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                                    <div className="flex flex-col">
                                        <span className="control-label">Speed</span>
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => setScrollSpeed(s => Math.max(1, s - 0.5))} className="step-btn">-</button>
                                            <input type="range" min="1" max="25" step="0.5" value={scrollSpeed} onChange={(e) => setScrollSpeed(parseFloat(e.target.value))} className="w-20" />
                                            <button onClick={() => setScrollSpeed(s => Math.min(25, s + 0.5))} className="step-btn">+</button>
                                            <span className="text-[10px] font-mono text-emerald-400 w-8 text-center">{scrollSpeed}</span>
                                        </div>
                                    </div>
                                    <div className="flex flex-col">
                                        <span className="control-label">Margin</span>
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => setMargin(m => Math.max(0, m - 2))} className="step-btn">-</button>
                                            <input type="range" min="0" max="40" step="1" value={margin} onChange={(e) => setMargin(parseInt(e.target.value))} className="w-20" />
                                            <button onClick={() => setMargin(m => Math.min(40, m + 2))} className="step-btn">+</button>
                                            <span className="text-[10px] font-mono text-blue-400 w-8 text-center">{margin}%</span>
                                        </div>
                                    </div>
                                    <div className="flex flex-col">
                                        <span className="control-label">Size</span>
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => setFontSize(f => Math.max(20, f - 4))} className="step-btn">-</button>
                                            <input type="range" min="20" max="120" step="4" value={fontSize} onChange={(e) => setFontSize(parseInt(e.target.value))} className="w-20" />
                                            <button onClick={() => setFontSize(f => Math.min(120, f + 4))} className="step-btn">+</button>
                                            <span className="text-[10px] font-mono w-8 text-center">{fontSize}</span>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-1 items-center">
                                        <span className="control-label">Optics</span>
                                        <div className="flex gap-1">
                                            <button 
                                                onClick={() => {
                                                    const c = ['none', 'mirror', 'flip', 'beamsplitter'];
                                                    setMirrorMode(c[(c.indexOf(mirrorMode) + 1) % c.length]);
                                                }}
                                                className="text-[8px] font-black uppercase text-orange-500 bg-orange-500/10 px-2 py-1 rounded border border-orange-500/20 min-w-[50px] transition-colors"
                                            >
                                                {mirrorMode}
                                            </button>
                                            <div className="flex bg-white/5 rounded p-0.5 border border-white/10 gap-0.5">
                                                <button onClick={() => setAlignment('left')} className={`p-1.5 rounded transition-all ${alignment === 'left' ? 'bg-indigo-500 text-white shadow-lg' : 'text-zinc-500 hover:text-zinc-300'}`}><IconAlignLeft /></button>
                                                <button onClick={() => setAlignment('center')} className={`p-1.5 rounded transition-all ${alignment === 'center' ? 'bg-indigo-500 text-white shadow-lg' : 'text-zinc-500 hover:text-zinc-300'}`}><IconAlignCenter /></button>
                                                <button onClick={() => setAlignment('right')} className={`p-1.5 rounded transition-all ${alignment === 'right' ? 'bg-indigo-500 text-white shadow-lg' : 'text-zinc-500 hover:text-zinc-300'}`}><IconAlignRight /></button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* --- MAIN STAGE --- */}
                    <div className="flex-grow relative flex flex-col overflow-hidden">
                        {isEditing ? (
                            <div className="flex-grow p-10 flex flex-col max-w-6xl mx-auto w-full animate-in fade-in zoom-in-95">
                                <div className="bg-[#ffffff] rounded-[2.5rem] shadow-[0_50px_120px_rgba(0,0,0,0.6)] flex-grow overflow-hidden flex flex-col border border-zinc-200">
                                    <div className="bg-zinc-50/90 backdrop-blur-md p-6 border-b border-zinc-200 flex justify-between items-center">
                                        <div className="flex items-center gap-3"><div className="w-3 h-3 rounded-full bg-zinc-200"></div><span className="text-zinc-400 font-mono text-[10px] uppercase tracking-widest font-bold">Cloud Script Engine Active</span></div>
                                        <button onClick={optimizeScript} disabled={isAiProcessing || !script} className={`px-8 py-3 rounded-2xl font-black text-[11px] tracking-widest transition-all ${isAiProcessing ? 'bg-zinc-100 text-zinc-400' : 'bg-black text-white hover:bg-zinc-800 shadow-xl active:scale-95'}`}>
                                            {isAiProcessing ? 'SMART PARSING...' : 'AI SCRIPT OPTIMIZE'}
                                        </button>
                                    </div>
                                    <div contentEditable onBlur={(e) => setScript(e.currentTarget.innerHTML)} dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(script) }} placeholder="Enter script here..." className="flex-grow p-14 text-zinc-900 focus:outline-none overflow-y-auto leading-relaxed text-3xl font-medium" />
                                </div>
                            </div>
                        ) : (
                            <div className="flex-grow flex flex-col overflow-hidden relative">
                                <div className="fade-overlay"></div>
                                <div className="absolute top-1/2 left-0 w-full -translate-y-1/2 pointer-events-none z-[10] border-y border-indigo-500/10 flex items-center justify-between px-3" style={{ height: `${fontSize * 1.5}px` }}>
                                    {!isPlaying && (
                                        <>
                                            <div className="text-emerald-500 opacity-80 animate-bounce-left"><IconPointerArrow /></div>
                                            <div className="text-emerald-500 opacity-80 animate-bounce-right rotate-180"><IconPointerArrow /></div>
                                        </>
                                    )}
                                </div>
                                <div ref={prompterRef} onScroll={updateProgress} className={`flex-grow overflow-y-auto py-[48vh] scroll-smooth ${mirrorMode === 'mirror' ? 'mirror-h' : mirrorMode === 'flip' ? 'mirror-v' : mirrorMode === 'beamsplitter' ? 'mirror-both' : ''}`} style={{ fontSize: `${fontSize}px`, paddingLeft: `${margin}%`, paddingRight: `${margin}%` }}>
                                    <div className={`w-full font-medium tracking-tight leading-[1.38] ${getAlignmentClass()}`}><RenderScript /></div>
                                </div>
                                {!isPlaying && <div className="absolute bottom-0 left-0 w-full h-1.5 bg-white/5 z-[100]"><div className="h-full bg-emerald-500 transition-all duration-300 shadow-[0_0_20px_#10b981]" style={{ width: `${progress}%` }}></div></div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
